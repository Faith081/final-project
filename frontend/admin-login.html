<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - InsureNow</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-back">
      <a href="/login.html" class="btn-back">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        Back to User Login
      </a>
    </div>

    <div class="auth-logo">
      <a href="/index.html">InsureNow</a>
    </div>

    <div style="text-align:center;margin-bottom:1.5rem;">
      <span style="display:inline-block;background:#fef3c7;color:#92400e;font-size:0.8125rem;font-weight:600;padding:0.375rem 0.875rem;border-radius:999px;">Admin Portal</span>
    </div>

    <h1 class="auth-title">Admin Sign In</h1>
    <p class="auth-subtitle">Access the admin dashboard</p>

    <div id="alert" class="alert"></div>

    <form id="admin-login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="admin@example.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-password-wrapper">
          <input type="password" id="password" class="form-control" placeholder="Your password" required>
          <button type="button" class="password-toggle" onclick="togglePassword('password', this)" tabindex="-1">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <div style="text-align:right;margin-top:-0.75rem;margin-bottom:1.25rem;">
        <a href="/forgot-password.html" style="font-size:0.875rem;color:var(--accent-dark);text-decoration:none;font-weight:600;">Forgot password?</a>
      </div>

      <button type="submit" id="submit-btn" class="btn btn-primary btn-full">Sign In as Admin</button>
    </form>

    <div class="auth-footer">
      Not an admin? <a href="/login.html">User login</a>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId)
    const isHidden = input.type === 'password'
    input.type = isHidden ? 'text' : 'password'
    btn.innerHTML = isHidden
      ? `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;">
           <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
         </svg>`
      : `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;">
           <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
           <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
         </svg>`
  }

  const token = api.getToken()
  const user = api.getUser()
  if (token && user?.role === 'admin') window.location.href = '/admin-dashboard.html'

  const form = document.getElementById('admin-login-form')
  const alert = document.getElementById('alert')
  const btn = document.getElementById('submit-btn')

  form.addEventListener('submit', async (e) => {
    e.preventDefault()
    hideAlert(alert)
    setLoading(btn, true, 'Signing in...')

    const email = document.getElementById('email').value.trim()
    const password = document.getElementById('password').value

    try {
      const res = await api.fetch('/admin/login', {
        method: 'POST',
        body: JSON.stringify({ email, password })
      })

      api.setAuth(res.token, { ...res.user, role: 'admin' })
      window.location.href = '/admin-dashboard.html'

    } catch (err) {
      showAlert(alert, err.message)
    } finally {
      setLoading(btn, false)
    }
  })
</script>

</body>
</html>
