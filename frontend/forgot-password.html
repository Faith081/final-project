<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - InsureNow</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-back">
      <a href="/login.html" class="btn-back">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        Back to Login
      </a>
    </div>

    <div class="auth-logo">
      <a href="/index.html">InsureNow</a>
    </div>

    <h1 class="auth-title">Forgot Password?</h1>
    <p class="auth-subtitle">Enter your email and we will send you a reset link</p>

    <div id="alert" class="alert"></div>

    <!-- Form state -->
    <div id="form-state">
      <form id="forgot-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <button type="submit" id="submit-btn" class="btn btn-primary btn-full">Send Reset Link</button>
      </form>

      <div class="auth-footer">
        Remembered it? <a href="/login.html">Back to login</a>
      </div>
    </div>

    <!-- Success state -->
    <div id="success-state" style="display:none; text-align:center;">
      <div style="width:72px;height:72px;background:var(--accent-light);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;">
        <svg width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="var(--accent-dark)" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
      <h2 style="font-size:1.25rem;font-weight:700;margin-bottom:0.5rem;color:var(--primary)">Check Your Email</h2>
      <p style="color:var(--muted);font-size:0.9375rem;margin-bottom:1.5rem;line-height:1.6;">
        We sent a password reset link to <strong id="sent-email"></strong>.<br>
        The link expires in <strong>1 hour</strong>.
      </p>
      <a href="/login.html" class="btn btn-primary btn-full">Back to Login</a>
      <p style="margin-top:1rem;font-size:0.875rem;color:var(--muted)">
        Didn't receive it?
        <a href="#" onclick="resetForm(); return false;" style="color:var(--accent-dark);font-weight:600;">Try again</a>
      </p>
    </div>

  </div>
</div>

<script src="/js/api.js"></script>
<script>
  const form = document.getElementById('forgot-form')
  const alertEl = document.getElementById('alert')
  const btn = document.getElementById('submit-btn')

  form.addEventListener('submit', async (e) => {
    e.preventDefault()
    hideAlert(alertEl)
    setLoading(btn, true, 'Sending...')

    const email = document.getElementById('email').value.trim()

    try {
      await api.fetch('/forgot-password', {
        method: 'POST',
        body: JSON.stringify({ email })
      })

      document.getElementById('sent-email').textContent = email
      document.getElementById('form-state').style.display = 'none'
      document.querySelector('.auth-title').style.display = 'none'
      document.querySelector('.auth-subtitle').style.display = 'none'
      document.getElementById('success-state').style.display = 'block'

    } catch (err) {
      showAlert(alertEl, err.message)
    } finally {
      setLoading(btn, false)
    }
  })

  function resetForm() {
    document.getElementById('form-state').style.display = 'block'
    document.querySelector('.auth-title').style.display = 'block'
    document.querySelector('.auth-subtitle').style.display = 'block'
    document.getElementById('success-state').style.display = 'none'
    form.reset()
    hideAlert(alertEl)
  }
</script>

</body>
</html>
