<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - InsureNow</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-back">
      <a href="/index.html" class="btn-back">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        Back to Home
      </a>
    </div>

    <div class="auth-logo">
      <a href="/index.html">InsureNow</a>
    </div>

    <h1 class="auth-title">Create your account</h1>
    <p class="auth-subtitle">Start your health insurance journey today</p>

    <div id="alert" class="alert"></div>

    <div id="success-state" style="display:none; text-align:center;">
      <div style="width:72px;height:72px;background:#d1fae5;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;">
        <svg width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="#16a34a" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <h2 style="font-size:1.25rem;font-weight:700;margin-bottom:0.5rem;">Account Created!</h2>
      <p style="color:var(--muted);font-size:0.9375rem;margin-bottom:1.5rem;">
        We sent a verification link to your email.<br>Please check your inbox and verify your account before logging in.
      </p>
      <a href="/login.html" class="btn btn-primary btn-full">Go to Login</a>
    </div>

    <form id="register-form">
      <div class="form-group">
        <label for="username">Full Name</label>
        <input type="text" id="username" class="form-control" placeholder="John Doe" required>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-password-wrapper">
          <input type="password" id="password" class="form-control" placeholder="At least 6 characters" required minlength="6">
          <button type="button" class="password-toggle" onclick="togglePassword('password', this)" tabindex="-1">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" id="submit-btn" class="btn btn-primary btn-full">
        Create Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/login.html">Sign in</a>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId)
    const isHidden = input.type === 'password'
    input.type = isHidden ? 'text' : 'password'
    btn.innerHTML = isHidden
      ? `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;">
           <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
         </svg>`
      : `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;">
           <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
           <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
         </svg>`
  }

  if (api.getToken()) window.location.href = '/dashboard.html'

  const form = document.getElementById('register-form')
  const alert = document.getElementById('alert')
  const btn = document.getElementById('submit-btn')
  const successState = document.getElementById('success-state')

  form.addEventListener('submit', async (e) => {
    e.preventDefault()
    hideAlert(alert)
    setLoading(btn, true, 'Creating account...')

    const username = document.getElementById('username').value.trim()
    const email = document.getElementById('email').value.trim()
    const password = document.getElementById('password').value

    try {
      await api.fetch('/register', {
        method: 'POST',
        body: JSON.stringify({ username, email, password })
      })

      form.style.display = 'none'
      document.querySelector('.auth-title').style.display = 'none'
      document.querySelector('.auth-subtitle').style.display = 'none'
      successState.style.display = 'block'

    } catch (err) {
      showAlert(alert, err.message)
    } finally {
      setLoading(btn, false)
    }
  })
</script>

</body>
</html>
